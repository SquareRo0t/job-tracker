<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobbansökningar</title>

    <!-- Länk till CSS-filen för styling -->
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">

</head>

<body>
    <form action="/edit/{{job[0]}}" method="POST">
        <label for="company">Företagsnamn</label><br>
        <input type="text" id="company" name="company" value="{{ job[1] }}" required>

        <label for="date">Datum</label>
        <input type="date" id="date" name="date" value="{{ job[2] }}" required>

        <label for="recruite_name">Rekryterarens namn</label>
        <input type="text" id="recruite_name" name="recruite_name" value="{{ job[3] }}" required>

        <label for="email">E-post:</label>
        <input type="email" id="email" name="email" value="{{ job[4] }}" required>

        <label for="phone">Telefon:</label>
        <input type="tel" id="phone" name="phone" value="{{ job[5] }}" required>

        <label for="status">Status</label>

        <!-- Dropdown för att välja status -->
        <select name="status" id="status">
            <!-- Markera nuvarande status som förvald -->
            <option value="Sökt" {% if job[6]=='Sökt' %} selected{% endif %}>Sökt</option>
            <option value="Intervju" {% if job[6]=='Intervju' %} selected{% endif %}>Intervju</option>
            <option value="Avslag" {% if job[6]=='Avslag' %} selected{% endif %}>Avslag</option>
        </select>

        <button type="submit">Spara</button>
    </form>
</body>

</html>
